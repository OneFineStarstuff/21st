name: AGI System CI

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/agi-system/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'packages/agi-system/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r packages/agi-system/requirements.txt

    - name: Lint with bandit
      run: |
        bandit -r packages/agi-system/

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 packages/agi-system/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 packages/agi-system/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run tests
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)/packages/agi-system
        cd packages/agi-system
        python -m unittest discover tests
